<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasky</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <header>
      <h1>Welcome to Tasky</h1>
    </header>
    <main>
      <div class="controls">
        <button id="add-task" class="btn" aria-label="Add new task">
          Add New Task
        </button>
        <button id="remove-task" class="btn">Remove Task</button>
      </div>
      <ul id="tasks-list" class="task-list">
        <!-- Tasks will be added here dynamically -->
      </ul>
    </main>

    <dialog id="task-dialog">
      <form id="task-form">
        <h2>Add new task</h2>
        <label for="task-title-input">Title:</label>
        <input type="text" id="task-title-input" placeholder="Title" required />
        <label for="task-description-input">Description:</label>
        <textarea
          id="task-description-input"
          placeholder="Description"
          required
        ></textarea>
        <label for="task-datetime-input">Time and Date:</label>
        <input type="datetime-local" id="task-datetime-input" required />
        <div class="dialog-actions">
          <button type="submit" class="btn">Save</button>
          <button type="button" id="cancel-task-btn" class="btn">Cancel</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/main.js" defer></script>
  </body>
</html>
