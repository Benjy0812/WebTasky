<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasky</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <header>
      <h1>Welcome to Tasky</h1>
    </header>
    <main>
      <div class="controls">
        <button id="add-task" class="btn">Add New Task</button>
        <button id="remove-task" class="btn">Remove Task</button>
      </div>
      <ul id="task-box" class="task-list">
        <li class="task-card">
          <h3>Main: Get milk</h3>
          <p>description: Get milk at EuroSpar</p>
          <p>
            Time and Date:
            <time class="due-date" datetime="2026-01-01T12:24"
              >12:24 / 01.01.2026</time
            >
          </p>
          <button id="delete-task" class="btn-trash btn-trash-border-red">
            <img src="/public/assets/icons/trash.svg" alt="Trash" />
          </button>
        </li>
        <li class="task-card">
          <h3>Main: Play games</h3>
          <p>description: Play CS with friends.</p>
          <p>
            Time and Date:
            <time class="due-date" datetime="2026-01-01T12:40"
              >12:40 / 01.01.2026</time
            >
          </p>
        </li>
      </ul>
    </main>
    <script src="/main.js" defer></script>
  </body>
</html>
