<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasky</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <header>
      <h1>Welcome to Tasky</h1>
    </header>
    <main>
      <div class="controls">
        <button id="addTaskBtn" class="button" aria-label="Add new task">
          Add New Task
        </button>
        <button id="removeTaskBtn" class="button">Remove Task</button>
      </div>
      <ul id="tasksContainer" class="task-container">
        <!-- Tasks will be added here dynamically -->
        <li class="task-item">
          <h3>Main: Get milk</h3>
          <p>description: Get milk at EuroSpar</p>
          <p>
            Time and Date:
            <time class="due-date" datetime="2026-01-01T12:24"
              >12:24 / 01.01.2026</time
            >
          </p>
          <button id="deleteTaskBtn" class="delete-button">Remove</button>
        </li>
      </ul>
    </main>

    <dialog id="taskModal" class="modal">
      <form id="taskForm">
        <h2>Add new task</h2>
        <label for="taskTitleInput">Title:</label>
        <input
          type="text"
          name="title"
          id="taskTitleInput"
          placeholder="Title"
          required
          class="modal-input"
        />
        <label for="taskDescriptionInput">Description:</label>
        <textarea
          name="description"
          id="taskDescriptionInput"
          placeholder="Description"
          required
          class="modal-input"
        ></textarea>
        <label for="taskDatetimeInput">Time and Date:</label>
        <input
          type="datetime-local"
          name="datetime"
          id="taskDatetimeInput"
          required
          class="modal-input"
        />
        <div class="dialog-actions">
          <button type="submit" class="modal-button">Save</button>
          <button type="button" id="cancelTaskBtn" class="modal-button">
            Cancel
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/main.js" defer></script>
  </body>
</html>
